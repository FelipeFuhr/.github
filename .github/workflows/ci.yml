name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflows-policy:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3

  codeql-actions:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  # Lint workflow files in this repo AND in workflow-templates/
  actionlint:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3
    with:
      working-directory: "."

  # Validate community health file markdown is well-formed
  markdown-check:
    name: Markdown files
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3
    with:
      commands: |
        python3 - <<'PY'
        import glob, sys
        files = glob.glob('*.md') + glob.glob('**/*.md', recursive=True)
        files = [f for f in files if not f.startswith('.git')]
        print(f'Checked {len(files)} markdown files — all readable.')
        for f in files:
            open(f).read()
        PY
