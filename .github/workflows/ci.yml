name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflows-policy:
    timeout-minutes: 15
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4

  codeql-actions:
    timeout-minutes: 30
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  # Lint workflow files in this repo AND in workflow-templates/
  actionlint:
    timeout-minutes: 15
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      working-directory: "."

  # Validate community health file markdown is well-formed
  markdown-check:
    timeout-minutes: 15
    name: Markdown files
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      commands: |
        python3 -c "
        import glob, sys
        files = glob.glob('*.md') + glob.glob('**/*.md', recursive=True)
        files = [f for f in files if not f.startswith('.git')]
        print(f'Checked {len(files)} markdown files — all readable.')
        for f in files:
            open(f).read()
        "
