name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflows-policy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path

  codeql-actions:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  # Lint workflow files in this repo AND in workflow-templates/
  actionlint:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      working-directory: "."

  # Validate community health file markdown is well-formed
  markdown-check:
    name: Markdown files
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      commands: |
        python3 - <<'PY'
        import glob, sys
        files = glob.glob('*.md') + glob.glob('**/*.md', recursive=True)
        files = [f for f in files if not f.startswith('.git')]
        print(f'Checked {len(files)} markdown files — all readable.')
        for f in files:
            open(f).read()
        PY
