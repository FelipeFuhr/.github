name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Uses ffreis-workflows-go reusable workflows.
# Renovate will pin these @main refs to full commit SHAs.
jobs:
  fmt:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@main
    with:
      working-directory: .

  lint:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@main
    with:
      working-directory: .

  build:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-build.yml@main
    with:
      working-directory: .

  test:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@main
    with:
      working-directory: .
